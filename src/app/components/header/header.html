<header class="app-header">
    <div class="header-content desktop-view">
        <div class="header-left">
            <!-- Space for future breadcrumbs or search -->
        </div>

        <div class="header-right">
            <!-- Notification Area -->
            <div class="notification-container" style="position: relative;">
                <button class="icon-button notification-btn" (click)="toggleNotification($event)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-bell">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                    </svg>
                    @if (notificationService.unreadCount() > 0) {
                    <span class="badge">{{ notificationService.unreadCount() }}</span>
                    }
                </button>
                @if (isNotificationOpen()) {
                <app-notification-dropdown (closeDropdown)="isNotificationOpen.set(false)" />
                }
            </div>

            <!-- Profile Area -->
            <div class="profile-container" (click)="toggleDropdown($event)">
                <div class="profile-trigger" [class.active]="isDropdownOpen()">
                    <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="User Avatar" class="avatar" />
                    <div class="user-info">
                        <span class="user-name">Alan</span>
                        <span class="user-role">Administrador</span>
                    </div>
                    <svg class="chevron" [class.rotated]="isDropdownOpen()" xmlns="http://www.w3.org/2000/svg"
                        width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Header View -->
    <div class="header-content mobile-view">
        <button class="icon-button" (click)="toggleSidebarMobile()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" x2="20" y1="12" y2="12" />
                <line x1="4" x2="20" y1="6" y2="6" />
                <line x1="4" x2="20" y1="18" y2="18" />
            </svg>
        </button>

        <div class="mobile-logo-container">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span class="logo-text">Company</span>
        </div>

        <div class="profile-container" (click)="toggleDropdown($event)">
            <button class="icon-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1.5" />
                    <circle cx="12" cy="5" r="1.5" />
                    <circle cx="12" cy="19" r="1.5" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Shared Dropdown -->
    @if (isDropdownOpen()) {
    <app-profile-dropdown (closeDropdown)="isDropdownOpen.set(false)" />
    }
</header>
